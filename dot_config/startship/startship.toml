# Don't print a new line at the start of the prompt
add_newline = false

# Allow execute command and retrieve information
command_timeout = 800

# Change the default prompt format
format = """
$all\
$character"""

# Change the default prompt characters
[character]
success_symbol = "[❯](205)"
error_symbol = "[❯](205)"

[line_break]
disabled = true

# Shows the username
# [username]
# style_user = "white bold"
# style_root = "black bold"
# format = "[$user]($style) "
# disabled = false
# show_always = true

[directory]
truncation_length = 100
truncate_to_repo = false
read_only_style = "197"
read_only = "  "
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
format = '[$symbol$branch]($style)'
style = "bold white"

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "🏳"
up_to_date = "✔"
untracked = " "
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
stashed = " "
modified = " "
staged = '[++\($count\)](green)'
renamed = "襁 "
deleted = " "

[aws]
format = '\[AWS: [$profile/($region)]($style)\]'
symbol = ' '
style = 'bold orange'

[terraform]
format = " [ terraform $version]($style) 壟 [$workspace]($style) "
symbol = ' '

[vagrant]
format = " [${symbol}vagrant $version]($style) "
symbol = " "
style = 'bold blue'

[docker_context]
format = " [ $context](bold blue) "

[kubernetes]
format = 'on [ $context\($namespace\)](bold purple) '
disabled = false

[helm]
format = " [ $version](bold purple) "

[python]
symbol = " "
python_binary = "python3"
style = 'bold blue'
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\))]($style)'

[nodejs]
format = " [ $version](bold green) "
disabled = true

[ruby]
format = " [ $version]($style) "
style = 'bold red'
