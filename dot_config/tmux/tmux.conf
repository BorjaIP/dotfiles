################################################################
#                                                              #
#                        CONFIGURATION                         #
#                                                              #
################################################################

# Add support for truecolor
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Increase scrollback lines
set -g history-limit 50000

# Enable mouse support for switching panes/windows
setw -g mouse on

# Automatically renumber tmux windows
set -g renumber-windows on

# Make window/pane index start with 1
set -g base-index 1
setw -g pane-base-index 1

# Make delay shorter
set -sg escape-time 0

# User system clipboard
set -g set-clipboard on

# Set vi mode for copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Copy to Mac clipboard when yanking in copy mode
if-shell "uname | grep -q Darwin" {
  bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
}

# Don't rename windows automatically
set-option -g allow-rename off

################################################################
#                                                              #
#                       COLOR & STYLE                          #
#                                                              #
################################################################

source ~/.config/tmux/theme.conf

################################################################
#                                                              #
#                        KEY BINDINGS                          #
#                                                              #
################################################################

# Unbind default prefix and set it to Ctrl+a
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# Reload config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config Reloaded!"

# Split window and fix path 
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane movement 
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Windows movement
bind -r M-h select-window -t :-
bind -r M-l select-window -t :+

# Synchronize all panes in a window
bind y setw synchronize-panes

################################################################
#                                                              #
#                           PLUGINS                            #
#                                                              #
################################################################

# Restore session after shutdown or reboot
if-shell "test -f ~/.local/share/tmux/plugins/tmux-resurrect/resurrect.tmux" \
    "run-shell ~/.local/share/tmux/plugins/tmux-resurrect/resurrect.tmux"
